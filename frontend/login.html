<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1><span>$</span> ExpenseTracker</h1>
                <p>Track your finances with ease</p>
            </div>
            <div class="auth-title"><h2>Welcome Back</h2></div>
            <div id="errorAlert" class="alert alert-danger"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
            </form>
            <div class="auth-link">Don't have an account? <a href="register.html">Register</a></div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const alertEl = document.getElementById('errorAlert');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alertEl.textContent = 'Please fill in all fields.';
                alertEl.className = 'alert alert-danger show';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            alertEl.className = 'alert alert-danger';

            try {
                const res = await fetch('https://expense-tracker-2-4o4e.onrender.com/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                storeTokens(data.access_token, data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                alertEl.textContent = err.message;
                alertEl.className = 'alert alert-danger show';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
