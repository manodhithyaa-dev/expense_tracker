<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><h2><span>$</span> ExpenseTracker</h2></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"><span class="icon">&#9632;</span> Dashboard</a>
            <a href="reports.html"><span class="icon">&#128202;</span> Reports</a>
            <a href="expenses.html"><span class="icon">&#36;</span> Expenses</a>
            <a href="income.html"><span class="icon">&#8593;</span> Income</a>
            <a href="categories.html"><span class="icon">&#9776;</span> Categories</a>
            <a href="budgets.html"><span class="icon">&#128176;</span> Budgets</a>
            <a href="notifications.html"><span class="icon">&#128276;</span> Notifications</a>
            <a href="settings.html" class="active"><span class="icon">&#9881;</span> Settings</a>
            <a href="profile.html"><span class="icon">&#128100;</span> Profile</a>
        </nav>
        <div class="sidebar-footer"><a href="#" id="logoutBtn"><span class="icon">&#8592;</span> Logout</a></div>
    </aside>
    <div class="main-content">
        <header class="navbar">
            <div class="navbar-left"><button class="menu-toggle" id="menuToggle">&#9776;</button><h1 class="page-title">Settings</h1></div>
            <div class="navbar-right"><div class="navbar-user"><div class="user-avatar" id="userAvatar">U</div><div class="user-info"><div class="user-name" id="userName">User</div><div class="user-email" id="userEmail">user@example.com</div></div></div></div>
        </header>
        <div class="page-content">
            <div id="errorAlert" class="alert alert-danger"></div>
            <div id="successAlert" class="alert alert-success"></div>
            <div class="content-grid">
                <div class="card">
                    <div class="card-header"><h3>Preferences</h3></div>
                    <div class="card-body">
                        <form id="settingsForm">
                            <div class="form-group">
                                <label for="settingsCurrency">Currency</label>
                                <select id="settingsCurrency" class="form-control">
                                    <option value="USD">USD ($)</option>
                                    <option value="INR">INR (&#8377;)</option>
                                    <option value="EUR">EUR (&#8364;)</option>
                                    <option value="GBP">GBP (&#163;)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settingsDateFormat">Date Format</label>
                                <select id="settingsDateFormat" class="form-control">
                                    <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                                    <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                                    <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settingsTheme">Theme</label>
                                <select id="settingsTheme" class="form-control">
                                    <option value="light">Light</option>
                                    <option value="dark">Dark</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="settingsTimezone">Timezone</label>
                                <input type="text" id="settingsTimezone" class="form-control" placeholder="UTC">
                            </div>
                            <div class="form-group">
                                <label for="settingsBudgetWarning">Budget Warning (%)</label>
                                <input type="number" id="settingsBudgetWarning" class="form-control" min="1" max="100" placeholder="80">
                            </div>
                            <button type="submit" class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
                        </form>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>Export Data</h3></div>
                    <div class="card-body">
                        <p style="color:var(--text-secondary);margin-bottom:16px;">Download your financial data for external analysis.</p>
                        <div style="display:flex;flex-direction:column;gap:12px;">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="exportStart">From</label>
                                    <input type="date" id="exportStart" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label for="exportEnd">To</label>
                                    <input type="date" id="exportEnd" class="form-control">
                                </div>
                            </div>
                            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                <button class="btn btn-outline" onclick="exportCSV('expenses')">Export Expenses CSV</button>
                                <button class="btn btn-outline" onclick="exportCSV('income')">Export Income CSV</button>
                                <button class="btn btn-outline" onclick="exportBackup()">Export Full Backup</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
